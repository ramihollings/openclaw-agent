<div class="max-w-[800px] mx-auto px-6 pt-40 pb-32 min-h-screen relative z-10 flex flex-col gap-12">
    <div class="text-center space-y-4 stagger-1 mb-8">
        <h1 class="text-5xl font-bold tracking-tight italic">Token_Calc.</h1>
        <p class="text-lg text-white/50 font-light max-w-2xl mx-auto">Forecast AI agent expenditures entirely client-side. Zero server compute.</p>
    </div>
    
    <div class="glass-panel p-10 stagger-2 space-y-8">
        <div id="calc-status" class="mono text-xs text-[#1A73E8]">Initializing Live Pricing Sync...</div>
        
        <div id="calculator-ui" style="display:none;" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs mono uppercase text-white/40">Select Compute Model</label>
                <select id="model-select" class="calc-input"></select>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs mono uppercase text-white/40">Avg Prompt Tokens</label>
                    <input type="number" id="tokens-prompt" value="1000" class="calc-input">
                </div>
                <div class="space-y-2">
                    <label class="text-xs mono uppercase text-white/40">Avg Completion Tokens</label>
                    <input type="number" id="tokens-completion" value="500" class="calc-input">
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs mono uppercase text-white/40">Daily Request Frequency</label>
                <input type="number" id="frequency" value="100" class="calc-input">
            </div>
            
            <div class="pt-8 border-t border-white/5">
                <div class="flex justify-between items-end">
                    <div class="space-y-1">
                        <span class="text-xs mono uppercase text-white/40">Projected Monthly Total</span>
                        <h2 class="text-4xl font-bold text-[#1A73E8]" id="monthly-total">$0.00</h2>
                    </div>
                    <p id="model-details" class="text-[10px] mono text-white/20"></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    async function initCalculator() {
        const status = document.getElementById('calc-status');
        const ui = document.getElementById('calculator-ui');
        const select = document.getElementById('model-select');
        try {
            const response = await fetch('https://www.llm-prices.com/current-v1.json');
            if (!response.ok) throw new Error();
            const data = await response.json();
            status.innerText = "Live Sync: Active // Source: llm-prices.com";
            ui.style.display = "block";
            data.models.sort((a,b) => a.name.localeCompare(b.name)).forEach(m => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(m);
                opt.innerText = m.name + " (" + m.provider + ")";
                select.appendChild(opt);
            });
            function calculate() {
                const m = JSON.parse(select.value);
                const pTok = parseInt(document.getElementById('tokens-prompt').value);
                const cTok = parseInt(document.getElementById('tokens-completion').value);
                const freq = parseInt(document.getElementById('frequency').value);
                const costPerReq = (pTok * m.input_price / 1000000) + (cTok * m.output_price / 1000000);
                document.getElementById('monthly-total').innerText = "$" + (costPerReq * freq * 30).toFixed(2);
                document.getElementById('model-details').innerText = "$" + m.input_price + " in / $" + m.output_price + " out";
            }
            select.onchange = calculate;
            document.querySelectorAll('.calc-input').forEach(i => i.oninput = calculate);
            calculate();
        } catch (e) {
            status.innerText = "Sync Failed. Loading Offline Primitives...";
            const fallback = [{ name: "Gemini 1.5 Pro", input_price: 3.5, output_price: 10.5, provider: "Google" }];
            ui.style.display = "block";
            fallback.forEach(m => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(m);
                opt.innerText = m.name;
                select.appendChild(opt);
            });
        }
    }
    initCalculator();
</script>
